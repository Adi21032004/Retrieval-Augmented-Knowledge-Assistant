version: "3.9"

services:
  rag-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./src:/app/src          # ← add this line
      - ./main.py:/app/main.py  # ← and this
    env_file:
      - .env
    restart: unless-stopped

  rag-frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - rag-api
    restart: unless-stopped