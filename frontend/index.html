<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: #EEEDFE; display: flex;
      align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #111; }
    .header p  { font-size: 12px; color: #888; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; display: inline-block;
      margin-right: 5px;
    }

    /* Stats bar */
    .stats {
      padding: 8px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex; gap: 20px;
      background: #fafafa;
    }
    .stats span { font-size: 12px; color: #888; }
    .stats b    { color: #444; font-weight: 500; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg { display: flex; flex-direction: column; max-width: 80%; gap: 6px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.user .bubble {
      background: #534AB7; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #f5f5f5; color: #111;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    /* Sources */
    .sources { display: flex; flex-wrap: wrap; gap: 6px; }
    .source {
      background: #EEEDFE; color: #3C3489;
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; display: flex;
      align-items: center; gap: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }
    .dot-pulse span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #aaa; display: inline-block;
      animation: pulse 1.2s infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid #e5e5e5;
      display: flex; gap: 10px; align-items: center;
    }
    #question {
      flex: 1; padding: 10px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 10px; font-size: 14px;
      outline: none; background: #fafafa;
    }
    #question:focus { border-color: #534AB7; background: #fff; }

    .upload-btn, .send-btn {
      padding: 10px 16px; border-radius: 10px;
      font-size: 14px; cursor: pointer; border: none;
    }
    .upload-btn {
      background: #f5f5f5; color: #555;
      border: 1px solid #e5e5e5;
    }
    .send-btn { background: #534AB7; color: #fff; font-weight: 500; }
    .send-btn:disabled { background: #c5c2f0; cursor: not-allowed; }

    #file-input { display: none; }

    /* Upload toast */
    .toast {
      display: none;
      padding: 8px 16px; background: #f0fdf4;
      border: 1px solid #86efac; border-radius: 8px;
      font-size: 13px; color: #166534;
      margin: 0 20px 10px;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">📁</div>
    <div>
      <h1>RAG document assistant</h1>
      <p><span class="status-dot"></span>Connected · <span id="chunk-count">loading...</span></p>
    </div>
  </div>

  <div class="stats">
    <span>Vector DB: <b>ChromaDB</b></span>
    <span>Chunks: <b id="stat-chunks">—</b></span>
    <span>Model: <b id="stat-model">LLaMA 3 70B</b></span>
  </div>

  <div id="toast" class="toast"></div>

  <div id="messages">
    <div class="msg bot">
      <div class="bubble">👋 Hi! Ask me anything about your documents. I'll retrieve the most relevant sections and answer based on them.</div>
    </div>
  </div>

  <div class="input-area">
    <input type="file" id="file-input" accept=".pdf,.txt,.docx,.md" multiple />
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">📎 Upload</button>
    <input id="question" type="text" placeholder="Ask a question about your documents..." />
    <button class="send-btn" id="send-btn" onclick="sendQuestion()">Send →</button>
  </div>

</div>

<script>
  const API = 'http://localhost:8000';

  async function loadStats() {
    try {
      const res  = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById('stat-chunks').textContent = data.total_chunks;
      document.getElementById('chunk-count').textContent = `${data.total_chunks} chunks indexed`;
    } catch {
      document.getElementById('chunk-count').textContent = 'API offline';
    }
  }

  function addMessage(role, text, sources = []) {
    const box = document.getElementById('messages');

    const msg    = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble  = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);

    if (sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const pill = document.createElement('span');
        pill.className = 'source';
        pill.textContent = `📄 ${s.file_name} · p.${s.page}`;
        srcDiv.appendChild(pill);
      });
      msg.appendChild(srcDiv);
    }

    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
    return msg;
  }

  function addTyping() {
    const box = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'msg bot typing';
    msg.id = 'typing';
    msg.innerHTML = `<div class="bubble"><div class="dot-pulse"><span></span><span></span><span></span></div></div>`;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendQuestion() {
    const input = document.getElementById('question');
    const btn   = document.getElementById('send-btn');
    const q     = input.value.trim();
    if (!q) return;

    input.value = '';
    btn.disabled = true;

    addMessage('user', q);
    addTyping();

    try {
      const res  = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      removeTyping();
      addMessage('bot', data.answer, data.sources || []);
    } catch (err) {
      removeTyping();
      addMessage('bot', '⚠️ Could not reach the API. Make sure your server is running at localhost:8000.');
    }

    btn.disabled = false;
    input.focus();
  }

  // Upload documents
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    const toast = document.getElementById('toast');
    toast.textContent = `⏳ Uploading ${files.length} file(s)...`;
    toast.className = 'toast show';

    const form = new FormData();
    files.forEach(f => form.append('files', f));

    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      toast.textContent = `✅ ${data.message}`;
      setTimeout(() => { toast.className = 'toast'; }, 4000);
      loadStats();
    } catch {
      toast.textContent = '❌ Upload failed. Check your server.';
      setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    e.target.value = '';
  });

  // Send on Enter
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuestion();
  });

  loadStats();
</script>
</body>
</html>
